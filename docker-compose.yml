services:
  redis:
    image: redis:7
    container_name: distributed-ai-redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: distributed-ai-api
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - redis

  worker:
    build: .
    container_name: distributed-ai-worker
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info --concurrency=${WORKER_CONCURRENCY:-4}
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-4}
    volumes:
      - .:/app
    depends_on:
      - redis